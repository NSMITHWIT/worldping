<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Captain Claw's Lucky Claw Roll</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lobster&family=Special+Elite&family=Permanent+Marker&display=swap" rel="stylesheet">
  <style>
    @keyframes pulse {
      0%   { box-shadow: 0 0 5px #f4a223; }
      50%  { box-shadow: 0 0 25px #f4a223, 0 0 50px rgba(244,162,35,0.5); }
      100% { box-shadow: 0 0 5px #f4a223; }
    }
    @keyframes glow {
      0%, 100% { text-shadow: 0 0 15px #f4a223, 0 0 30px #f4a223, 0 0 60px rgba(244,162,35,0.5); }
      50%       { text-shadow: 0 0 8px #f4a223, 0 0 15px #f4a223; }
    }
    @keyframes signSway {
      0%, 100% { transform: rotate(-0.5deg); }
      50%       { transform: rotate(0.5deg); }
    }
    @keyframes bounce {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.12); }
    }

    * { box-sizing: border-box; }

    body {
      background-color: #0d0a06;
      background-image:
        repeating-linear-gradient(
          0deg,
          transparent 0px, transparent 36px,
          rgba(101,60,20,0.15) 36px, rgba(101,60,20,0.15) 38px
        );
      color: #f5f0e8;
      font-family: 'Special Elite', cursive;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-family: 'Lobster', cursive;
      font-size: clamp(2rem, 6vw, 3.5rem);
      color: #f4a223;
      text-shadow: 0 0 15px #f4a223, 2px 2px 0 #7a3b00;
      animation: signSway 4s ease-in-out infinite;
      margin-bottom: 0.2em;
    }

    .sub {
      font-family: 'Special Elite', cursive;
      font-size: 0.85rem;
      color: #4ecdc4;
      text-shadow: 0 0 6px #4ecdc4;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 2rem;
      border-top: 1px solid rgba(78,205,196,0.4);
      border-bottom: 1px solid rgba(78,205,196,0.4);
      padding: 0.3em 1em;
    }

    #result {
      font-family: 'Lobster', cursive;
      font-size: clamp(4rem, 15vw, 8rem);
      color: #f4a223;
      animation: glow 2.5s ease-in-out infinite;
      margin-bottom: 1rem;
      line-height: 1;
    }

    #roll {
      cursor: pointer;
      border: 3px solid #e8391d;
      padding: 0.5em 2em;
      font-family: 'Permanent Marker', cursive;
      font-size: 1.4rem;
      background: rgba(232,57,29,0.08);
      color: #e8391d;
      text-shadow: 0 0 6px #e8391d;
      animation: pulse 1.5s infinite;
      letter-spacing: 1px;
      transition: background 0.2s;
    }
    #roll:hover {
      background: rgba(232,57,29,0.18);
    }
    #roll:active {
      animation: bounce 0.15s ease-in-out;
    }

    .back {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #4ecdc4;
      text-decoration: none;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.7;
      font-family: 'Special Elite', cursive;
    }
    .back:hover { opacity: 1; }
  </style>
</head>
<body>
  <h1>🦞 Lucky Claw Roll 🦞</h1>
  <div class="sub">⚓ Captain Claw's Fortune Wheel ⚓</div>

  <div id="result">🦞 0</div>
  <button id="roll">🎣 PULL THE TRAP 🎣</button>

  <a class="back" href="/">← back to the shack</a>

  <script>
    const result = document.getElementById('result');
    const rollBtn = document.getElementById('roll');

    function rollDice() {
      const roll = Math.floor(Math.random() * (20 - 12 + 1)) + 12;
      result.textContent = `🦞 ${roll}`;
    }

    rollBtn.addEventListener('click', rollDice);
    window.onload = rollDice;
  </script>
</body>
</html>
