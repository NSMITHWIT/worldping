<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Captain Claw's World Famous Lobster Palace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lobster&family=Special+Elite&family=Permanent+Marker&display=swap" rel="stylesheet">
  <style>
    @keyframes pulse {
      0%   { box-shadow: 0 0 5px #f4a223; }
      50%  { box-shadow: 0 0 25px #f4a223, 0 0 50px rgba(244,162,35,0.4); }
      100% { box-shadow: 0 0 5px #f4a223; }
    }

    @keyframes redPulse {
      0%   { box-shadow: 0 0 5px #e8391d; }
      50%  { box-shadow: 0 0 25px #e8391d, 0 0 50px rgba(232,57,29,0.4); }
      100% { box-shadow: 0 0 5px #e8391d; }
    }

    @keyframes neonPulse {
      0%, 100% { text-shadow: 0 0 10px #e8391d, 0 0 20px #e8391d, 0 0 40px #e8391d; opacity: 1; }
      45%       { text-shadow: 0 0 5px #e8391d, 0 0 10px #e8391d; opacity: 0.9; }
      50%        { opacity: 0.4; text-shadow: none; }
      55%        { opacity: 1; }
    }

    @keyframes seafoamPulse {
      0%, 100% { text-shadow: 0 0 10px #4ecdc4, 0 0 25px #4ecdc4, 0 0 50px rgba(78,205,196,0.5); }
      50%       { text-shadow: 0 0 5px #4ecdc4, 0 0 12px #4ecdc4; }
    }

    @keyframes orangeGlow {
      0%, 100% { text-shadow: 0 0 10px #f4a223, 0 0 25px #f4a223, 0 0 50px rgba(244,162,35,0.5), 3px 3px 0 #7a3b00; }
      50%       { text-shadow: 0 0 20px #f4a223, 0 0 40px #f4a223, 0 0 80px rgba(244,162,35,0.6), 3px 3px 0 #7a3b00; }
    }

    @keyframes flicker {
      0%   { opacity: 0.3; transform: scale(0.95); }
      100% { opacity: 1;   transform: scale(1.05); }
    }

    @keyframes shake-screen {
      0%   { transform: translate(0px, 0px); }
      20%  { transform: translate(-5px, 3px); }
      40%  { transform: translate(4px, -4px); }
      60%  { transform: translate(-3px, 5px); }
      80%  { transform: translate(5px, -2px); }
      100% { transform: translate(0px, 0px); }
    }

    @keyframes signSway {
      0%, 100% { transform: rotate(-0.4deg) translateY(0px); }
      50%       { transform: rotate(0.4deg) translateY(-3px); }
    }

    @keyframes waveScroll {
      0%   { background-position: 0 0; }
      100% { background-position: 200px 0; }
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Special Elite', cursive;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background-color: #0d0a06;
      background-image:
        repeating-linear-gradient(
          0deg,
          transparent 0px, transparent 36px,
          rgba(101,60,20,0.18) 36px, rgba(101,60,20,0.18) 38px
        ),
        repeating-linear-gradient(
          90deg,
          transparent 0px, transparent 80px,
          rgba(101,60,20,0.08) 80px, rgba(101,60,20,0.08) 82px
        );
      color: #f5f0e8;
      font-size: 1.8rem;
      text-align: center;
      line-height: 1.6;
      overflow: hidden;
      transition: transform 0.1s ease-in-out;
      position: relative;
      padding: 2rem 1rem 5rem;
    }

    /* ── Wave strip at the bottom ── */
    body::after {
      content: '〰〰〰〰〰〰〰〰〰〰〰〰〰〰〰〰〰〰〰〰〰〰〰〰〰〰〰〰〰〰';
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      font-size: 1.5rem;
      color: #4ecdc4;
      opacity: 0.4;
      text-shadow: 0 0 8px #4ecdc4;
      letter-spacing: -4px;
      overflow: hidden;
      pointer-events: none;
      animation: waveScroll 8s linear infinite;
    }

    /* ── Big highway billboard header ── */
    #restaurant-header {
      font-family: 'Lobster', cursive;
      font-size: clamp(2.5rem, 8vw, 5rem);
      color: #f4a223;
      animation: orangeGlow 3s ease-in-out infinite, signSway 5s ease-in-out infinite;
      margin-bottom: 0.1em;
      letter-spacing: 2px;
    }

    #restaurant-sub {
      font-family: 'Special Elite', cursive;
      font-size: clamp(0.65rem, 2vw, 0.9rem);
      color: #4ecdc4;
      text-shadow: 0 0 8px #4ecdc4;
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      border-top: 2px solid rgba(78,205,196,0.6);
      border-bottom: 2px solid rgba(78,205,196,0.6);
      padding: 0.3em 1.5em;
    }

    .divider {
      color: #f4a223;
      font-size: 1.2rem;
      letter-spacing: 8px;
      margin: 0.6rem 0;
      opacity: 0.7;
    }

    .char {
      display: inline-block;
      transition: all 0.2s ease;
    }

    .glitch {
      color: #e8391d;
      text-shadow: 0 0 2px #e8391d;
      animation: flicker 0.1s infinite alternate;
    }

    #paywall-curse {
      font-family: 'Permanent Marker', cursive;
      font-size: 2.2rem;
      color: #e8391d;
      margin-bottom: 1rem;
      border: 3px dashed #e8391d;
      padding: 0.25em 0.8em;
      animation: neonPulse 5s ease-in-out infinite;
      display: inline-block;
      background: rgba(232,57,29,0.05);
    }

    #dice-roll {
      font-family: 'Special Elite', cursive;
      font-size: 2rem;
      color: #f4a223;
      text-shadow: 0 0 10px #f4a223;
      margin-top: 0.25rem;
      animation: pulse 2s infinite;
    }

    #utc-time {
      font-family: 'Lobster', cursive;
      font-size: clamp(2.8rem, 8vw, 5.5rem);
      font-weight: normal;
      margin-bottom: 0.5rem;
      color: #4ecdc4;
      animation: seafoamPulse 3s ease-in-out infinite;
    }

    .shake {
      animation: shake-screen 0.3s linear;
    }

    #tear-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      background-image: url('tear.jpg');
      background-size: cover;
      background-position: center;
      opacity: 0;
      pointer-events: none;
      z-index: 999;
      transition: opacity 0.05s ease;
    }

    .flash { opacity: 0.8 !important; }

    /* ── Ledger button top-right ── */
    #open-dashboard {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(78,205,196,0.08);
      border: 2px solid #4ecdc4;
      color: #4ecdc4;
      font-size: 0.8rem;
      font-family: 'Special Elite', cursive;
      padding: 0.4em 1em;
      cursor: pointer;
      text-shadow: 0 0 6px #4ecdc4;
      box-shadow: 0 0 8px rgba(78,205,196,0.3);
      letter-spacing: 0.1em;
      z-index: 1000;
      transition: box-shadow 0.2s, background 0.2s;
    }
    #open-dashboard:hover {
      box-shadow: 0 0 20px #4ecdc4;
      background: rgba(78,205,196,0.15);
    }

    /* ── Throw the Claws button bottom-right ── */
    #summon-sparks {
      position: fixed !important;
      bottom: 20px;
      right: 20px;
      background: rgba(232,57,29,0.08) !important;
      border: 2px solid #e8391d !important;
      color: #e8391d !important;
      font-family: 'Permanent Marker', cursive !important;
      font-size: 1rem !important;
      padding: 0.5em 1em !important;
      cursor: pointer !important;
      text-shadow: 0 0 5px #e8391d !important;
      animation: redPulse 1.5s infinite !important;
      z-index: 1000 !important;
    }

    /* ── Kitchen/fire button ── */
    #open-video {
      font-family: 'Permanent Marker', cursive;
      font-size: 1.4rem;
      padding: 0.5em 1.5em;
      background: rgba(232,57,29,0.08);
      color: #e8391d;
      border: 3px solid #e8391d;
      cursor: pointer;
      margin-top: 1.5rem;
      text-shadow: 0 0 5px #e8391d;
      box-shadow: 0 0 8px rgba(232,57,29,0.4);
      animation: redPulse 1.5s infinite;
      letter-spacing: 1px;
    }
    #open-video:hover {
      background: rgba(232,57,29,0.15);
    }
  </style>
</head>
<body>

  <button id="open-dashboard" onclick="window.location.href='/status'">
    ⚓ THE LEDGER
  </button>

  <button id="summon-sparks" style="
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(232,57,29,0.08);
    border: 2px solid #e8391d;
    color: #e8391d;
    font-family: 'Permanent Marker', cursive;
    font-size: 1rem;
    padding: 0.5em 1em;
    cursor: pointer;
    text-shadow: 0 0 5px #e8391d;
    animation: redPulse 1.5s infinite;
    font-weight: bold;
    z-index: 1000;
  ">🦞 THROW THE CLAWS 🦞</button>

  <audio id="bg-music" autoplay muted>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <div id="tear-overlay"></div>

  <div id="restaurant-header">🦞 Captain Claw's 🦞</div>
  <div id="restaurant-sub">⚓ World Famous Lobster Palace · Est. 1987 ⚓</div>

  <div class="divider">~ ⚓ ~ ⚓ ~ ⚓ ~</div>

  <div id="paywall-curse">PAYWALL CURSE</div>
  <div id="dice-roll">🦞 Rolling...</div>
  <div id="utc-time">⚓ LOADING...</div>
  <div id="ritual"></div>

  <button id="open-video" style="
    font-family: 'Permanent Marker', cursive;
    font-size: 1.4rem;
    padding: 0.5em 1.5em;
    background: rgba(232,57,29,0.08);
    color: #e8391d;
    border: 3px solid #e8391d;
    cursor: pointer;
    margin-top: 1.5rem;
    text-shadow: 0 0 5px #e8391d;
    box-shadow: 0 0 8px rgba(232,57,29,0.4);
    animation: redPulse 1.5s infinite;
    letter-spacing: 1px;">
    🔥 Witness the Fire 🔥
  </button>

  <script>
    // ── Claw summoner ─────────────────────────────────────────────────────────
    function summonSpark() {
      const spark = document.createElement('div');
      spark.textContent = ['🦞','🦐','🦀','🐚','🐟','🦑'][Math.floor(Math.random()*6)];
      Object.assign(spark.style, {
        position: 'fixed',
        left: `${Math.random() * 100}vw`,
        top: '-5vh',
        fontSize: `${Math.random() * 1.5 + 1}rem`,
        pointerEvents: 'none',
        zIndex: 1000,
        animation: 'fall 3s linear forwards'
      });
      document.body.appendChild(spark);
      setTimeout(() => spark.remove(), 3000);
    }

    document.getElementById('summon-sparks').addEventListener('click', () => {
      for (let i = 0; i < 25; i++) setTimeout(summonSpark, i * 100);
    });

    const fallKeyframes = document.createElement('style');
    fallKeyframes.textContent = `
      @keyframes fall {
        0%   { transform: translateY(0) rotate(0deg);      opacity: 1; }
        100% { transform: translateY(110vh) rotate(540deg); opacity: 0; }
      }`;
    document.head.appendChild(fallKeyframes);

    // ── Ritual text ───────────────────────────────────────────────────────────
    const lines = [

    ];

    const ritual = document.getElementById('ritual');
    lines.forEach(line => {
      const lineEl = document.createElement('div');
      [...line].forEach(char => {
        const span = document.createElement('span');
        span.className = 'char';
        span.textContent = char;
        lineEl.appendChild(span);
      });
      ritual.appendChild(lineEl);
    });

    // ── Background music ──────────────────────────────────────────────────────
    const audio = document.getElementById('bg-music');
    audio.volume = 0;
    window.addEventListener('DOMContentLoaded', () => {
      audio.play().then(() => {
        audio.muted = false;
        let vol = 0;
        const fade = setInterval(() => {
          if (vol < 1) { vol = Math.min(vol + 0.02, 1); audio.volume = vol; }
          else clearInterval(fade);
        }, 200);
      }).catch(err => console.warn("Autoplay failed:", err));
    });

    // ── Glitch effect ─────────────────────────────────────────────────────────
    function glitchCycle() {
      const chars = document.querySelectorAll('.char');
      if (!chars.length) return;
      const count = Math.floor(Math.random() * 4) + 1;
      for (let i = 0; i < count; i++) {
        const span = chars[Math.floor(Math.random() * chars.length)];
        const original = span.textContent;
        span.classList.add('glitch');
        span.textContent = ['█','░','▒','▓','@','#',' '][Math.floor(Math.random()*7)];
        setTimeout(() => {
          span.classList.remove('glitch');
          span.textContent = original;
        }, Math.random() * 300 + 100);
      }
    }
    setInterval(glitchCycle, 250);

    // ── Screen shake ──────────────────────────────────────────────────────────
    const tear = document.getElementById('tear-overlay');
    function shakeScreen() {
      document.body.classList.add('shake');
      tear.classList.add('flash');
      setTimeout(() => {
        document.body.classList.remove('shake');
        tear.classList.remove('flash');
      }, 100);
    }
    setInterval(() => { if (Math.random() < 0.2) shakeScreen(); }, 400);

    // ── Fire button ───────────────────────────────────────────────────────────
    document.getElementById('open-video').addEventListener('click', () => {
      window.open('video.html', '_blank');
    });

    // ── Catch-of-the-day number ───────────────────────────────────────────────
    const diceDiv = document.getElementById('dice-roll');
    function updateDice() {
      diceDiv.textContent = `🦞 ${Math.floor(Math.random() * 9) + 12}`;
    }
    updateDice();
    setInterval(() => { if (Math.random() < 0.2) updateDice(); }, 2000);

    // ── UTC clock ─────────────────────────────────────────────────────────────
    function updateUTC() {
      document.getElementById('utc-time').textContent =
        `⚓ UTC ${new Date().toUTCString().split(' ')[4]}`;
    }
    updateUTC();
    setInterval(updateUTC, 1000);
  </script>
</body>
</html>
